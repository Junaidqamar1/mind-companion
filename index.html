<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MindCompanion - Competitive Exam Student Wellness Tracker</title>
  <!-- Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
  
  <!-- Tailwind CSS CDN -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            sans: ['"Plus Jakarta Sans"', 'sans-serif'],
          },
          colors: {
            brand: {
              50: '#f0f9ff',
              100: '#e0f2fe',
              200: '#bae6fd',
              500: '#0ea5e9',
              600: '#0284c7',
              700: '#0369a1',
            },
            slate: {
              950: '#0f172a',
            }
          },
          animation: {
            'pulse-slow': 'pulse 3s cubic-bezier(0.4, 0, 0.6, 1) infinite',
            'float': 'float 6s ease-in-out infinite',
          },
          keyframes: {
            float: {
              '0%, 100%': { transform: 'translateY(0px)' },
              '50%': { transform: 'translateY(-10px)' },
            }
          }
        }
      }
    }
  </script>

  <!-- Google Gen AI SDK Loading via ESM CDN -->
  <script type="module">
    import { GoogleGenAI } from 'https://esm.sh/@google/genai';
    window.GoogleGenAI = GoogleGenAI;
    console.log('Google GenAI unified SDK imported successfully via ESM CDN.');
  </script>

  <!-- Alpine.js CDN -->
  <script src="https://unpkg.com/alpinejs" defer></script>

  <style>
    [x-cloak] { display: none !important; }
    
    /* Box breathing custom circle transitions */
    .inhale-circle {
      transform: scale(1.6);
      background-color: rgba(13, 148, 136, 0.25); /* teal-600 with opacity */
      border-color: rgba(13, 148, 136, 0.8);
      transition: all 4000ms linear;
    }
    .hold-circle {
      transform: scale(1.6);
      background-color: rgba(67, 56, 202, 0.25); /* indigo-700 with opacity */
      border-color: rgba(67, 56, 202, 0.8);
      transition: all 4000ms linear;
    }
    .exhale-circle {
      transform: scale(0.85);
      background-color: rgba(14, 165, 233, 0.2); /* sky-500 with opacity */
      border-color: rgba(14, 165, 233, 0.8);
      transition: all 4000ms linear;
    }
    .hold2-circle {
      transform: scale(0.85);
      background-color: rgba(100, 116, 139, 0.2); /* slate-500 with opacity */
      border-color: rgba(100, 116, 139, 0.8);
      transition: all 4000ms linear;
    }
    .idle-circle {
      transform: scale(1.0);
      background-color: rgba(226, 232, 240, 0.5);
      border-color: rgba(203, 213, 225, 1);
      transition: all 1000ms ease;
    }
  </style>
</head>
<body class="bg-slate-50 text-slate-800 font-sans min-h-screen flex flex-col md:flex-row antialiased selection:bg-indigo-100 selection:text-indigo-900" x-data="appState()">

  <!-- ONBOARDING GATEKEEPER SCREEN (Rendered if hasProfile is false) -->
  <div x-show="!hasProfile" x-cloak class="fixed inset-0 bg-gradient-to-tr from-slate-100 via-indigo-50/40 to-teal-50/50 z-50 flex items-center justify-center p-4 overflow-y-auto">
    <div class="bg-white rounded-3xl border border-slate-100 w-full max-w-lg p-6 sm:p-8 shadow-2xl space-y-6">
      
      <!-- Greeting and Logo header -->
      <div class="text-center space-y-3">
        <div class="w-12 h-12 rounded-2xl bg-gradient-to-tr from-indigo-600 to-teal-500 flex items-center justify-center text-white shadow-lg shadow-indigo-100 mx-auto">
          <svg class="w-7 h-7 animate-pulse" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
          </svg>
        </div>
        <div>
          <h2 class="font-extrabold text-2xl text-slate-900 tracking-tight">Set Up Your Exam Sanctuary</h2>
          <p class="text-xs text-slate-500 font-semibold mt-1">Tell us about your preparation track so we can personalize your wellness experience.</p>
        </div>
      </div>

      <!-- Form Setup -->
      <form @submit.prevent="submitOnboarding()" class="space-y-4 text-xs font-semibold text-slate-700">
        
        <!-- Name Input -->
        <div class="space-y-1.5">
          <label class="block text-slate-600">Full Name</label>
          <input type="text" x-model="onboardName" required 
                 placeholder="e.g. Aarav Mehta" 
                 class="w-full p-3 border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl text-sm font-semibold placeholder-slate-400 focus:outline-none transition" />
        </div>

        <div class="grid grid-cols-1 sm:grid-cols-2 gap-4">
          <!-- Target Exam Track Dropdown -->
          <div class="space-y-1.5">
            <label class="block text-slate-600">Target Examination</label>
            <select x-model="onboardTrack" required
                    class="w-full p-3 border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl text-sm font-semibold focus:outline-none transition">
              <option value="JEE">JEE (Engineering)</option>
              <option value="NEET">NEET (Medical)</option>
              <option value="UPSC">UPSC (Civil Services)</option>
              <option value="GATE">GATE (Postgrad Engineering)</option>
              <option value="CAT">CAT (Management)</option>
            </select>
          </div>

          <!-- Study Hours Input -->
          <div class="space-y-1.5">
            <label class="block text-slate-600">Daily Study Target (Hours)</label>
            <input type="number" x-model.number="onboardHours" required min="1" max="18"
                   placeholder="e.g. 8" 
                   class="w-full p-3 border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl text-sm font-semibold focus:outline-none transition" />
          </div>
        </div>

        <!-- Stressor Tags Dropdown -->
        <div class="space-y-1.5">
          <label class="block text-slate-600">Current Primary Stressor</label>
          <select x-model="onboardStressor" required
                  class="w-full p-3 border border-slate-200 focus:border-indigo-500 focus:ring-1 focus:ring-indigo-500 rounded-xl text-sm font-semibold focus:outline-none transition">
            <option value="Mock Test Scores">Mock Test Scores & Ranking</option>
            <option value="Backlog Anxiety">Backlog Accumulation & Syllabus Load</option>
            <option value="Parental Pressure">Parental Expectations & Pressure</option>
            <option value="Social Isolation">Isolation & Peer Comparison</option>
          </select>
        </div>

        <!-- Submit Buttons -->
        <div class="pt-4 flex flex-col sm:flex-row items-center gap-3">
          <button type="submit" 
                  class="w-full py-3 bg-gradient-to-r from-indigo-600 to-indigo-700 hover:from-indigo-700 hover:to-indigo-800 text-white font-bold rounded-xl shadow-lg shadow-indigo-100 text-sm transition">
            Start Journey 🚀
          </button>
          
          <button type="button" @click="loadJEEAspirantDemo()"
                  class="w-full py-3 bg-teal-50 hover:bg-teal-100 text-teal-800 border border-teal-200/50 font-bold rounded-xl text-xs transition flex items-center justify-center space-x-2">
            <span>Demo Profile: JEE Aspirant</span>
          </button>
        </div>

      </form>
    </div>
  </div>

  <!-- MAIN APP INTERFACE (Rendered if hasProfile is true) -->
  <template x-if="hasProfile">
    <div class="flex flex-col md:flex-row flex-1 min-w-0 min-h-screen">
      <!-- Sidebar Navigation -->
      <aside class="w-full md:w-64 bg-white border-r border-slate-100 flex flex-col shrink-0 md:sticky md:top-0 md:h-screen z-30 shadow-sm">
        <!-- Header/Logo -->
        <div class="p-6 flex items-center justify-between border-b border-slate-50">
          <div class="flex items-center space-x-3">
            <div class="w-10 h-10 rounded-xl bg-gradient-to-tr from-indigo-600 to-teal-500 flex items-center justify-center text-white shadow-md shadow-indigo-100">
              <!-- Logo Icon (Mind / Lotus Shape) -->
              <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M12 3v1m0 16v1m9-9h-1M4 12H3m15.364-6.364l-.707.707M6.343 17.657l-.707.707m0-12.728l.707.707m12.728 12.728l.707.707M12 8a4 4 0 100 8 4 4 0 000-8z"></path>
              </svg>
            </div>
            <div>
              <h1 class="font-bold text-lg text-slate-900 tracking-tight">MindCompanion</h1>
              <p class="text-xs font-semibold text-teal-600 tracking-wider uppercase">Exam Sanctuary</p>
            </div>
          </div>
          
          <!-- Mobile Menu Button (hidden on desktop) -->
          <button class="md:hidden p-2 rounded-lg hover:bg-slate-100 text-slate-600" @click="mobileMenuOpen = !mobileMenuOpen">
            <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
            </svg>
          </button>
        </div>

        <!-- Nav Items (Collapsible on mobile) -->
        <nav class="flex-1 p-4 space-y-1.5 overflow-y-auto" :class="{'block': mobileMenuOpen, 'hidden': !mobileMenuOpen && !window.matchMedia('(min-width: 768px)').matches}">
          <!-- Profile Card Mini -->
          <div class="mb-6 p-4 bg-slate-50/80 rounded-2xl border border-slate-100 flex items-center justify-between group">
            <div class="flex items-center space-x-3 min-w-0">
              <div class="w-10 h-10 rounded-full bg-indigo-100 flex items-center justify-center text-indigo-700 font-bold border border-indigo-200 shrink-0">
                <span x-text="studentName.split(' ').map(n => n[0]).join('')">JS</span>
              </div>
              <div class="flex-1 min-w-0">
                <p class="text-sm font-bold text-slate-900 truncate" x-text="studentName">Guest Student</p>
                <p class="text-xs text-slate-500 font-medium truncate" x-text="examTrack + ' Aspirant'"></p>
              </div>
            </div>
            <!-- Settings Gear Icon -->
            <button @click="settingsOpen = true" class="p-1.5 rounded-lg text-slate-400 hover:text-slate-700 hover:bg-slate-200/50 transition shrink-0" title="Settings">
              <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
            </button>
          </div>

          <button @click="setView('dashboard')" 
                  :class="activeView === 'dashboard' ? 'bg-indigo-50 text-indigo-950 font-semibold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
                  class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-150 group">
            <svg :class="activeView === 'dashboard' ? 'text-indigo-600' : 'text-slate-400 group-hover:text-slate-600'" class="w-5 h-5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M4 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2H6a2 2 0 01-2-2V6zM14 6a2 2 0 012-2h2a2 2 0 012 2v4a2 2 0 01-2 2h-2a2 2 0 01-2-2V6zM4 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2H6a2 2 0 01-2-2v-2zM14 16a2 2 0 012-2h2a2 2 0 012 2v2a2 2 0 01-2 2h-2a2 2 0 01-2-2v-2z"></path>
            </svg>
            <span class="text-sm">Dashboard</span>
          </button>

          <button @click="setView('journal')" 
                  :class="activeView === 'journal' ? 'bg-indigo-50 text-indigo-950 font-semibold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
                  class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-150 group">
            <svg :class="activeView === 'journal' ? 'text-indigo-600' : 'text-slate-400 group-hover:text-slate-600'" class="w-5 h-5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M11 5H6a2 2 0 00-2 2v11a2 2 0 002 2h11a2 2 0 002-2v-5m-1.414-9.414a2 2 0 112.828 2.828L11.828 15H9v-2.828l8.586-8.586z"></path>
            </svg>
            <span class="text-sm">Daily Mind-Dump</span>
          </button>

          <button @click="setView('coping')" 
                  :class="activeView === 'coping' ? 'bg-indigo-50 text-indigo-950 font-semibold' : 'text-slate-600 hover:bg-slate-50 hover:text-slate-900'"
                  class="w-full flex items-center space-x-3 px-4 py-3 rounded-xl transition duration-150 group">
            <svg :class="activeView === 'coping' ? 'text-indigo-600' : 'text-slate-400 group-hover:text-slate-600'" class="w-5 h-5 transition-colors" fill="none" stroke="currentColor" viewBox="0 0 24 24">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
            </svg>
            <span class="text-sm">AI Coping Deck</span>
          </button>

          <!-- Horizontal Divider -->
          <div class="h-px bg-slate-100 my-4"></div>

          <!-- Quick Demo Access & Settings -->
          <div class="space-y-2">
            <button @click="loadJEEAspirantDemo()" class="w-full py-2.5 px-4 bg-teal-50 hover:bg-teal-100 text-teal-800 border border-teal-200/50 rounded-xl text-xs font-bold transition flex items-center justify-center space-x-2 shadow-sm">
              <svg class="w-4 h-4 text-teal-600" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path>
              </svg>
              <span>Demo: JEE Aspirant</span>
            </button>

            <button @click="settingsOpen = true" class="w-full flex items-center space-x-3 px-4 py-2.5 text-slate-500 hover:text-slate-800 rounded-xl text-xs font-semibold hover:bg-slate-50 transition">
              <svg class="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
              </svg>
              <span>Gemini API Settings</span>
            </button>
          </div>
        </nav>

        <!-- Footer of Sidebar -->
        <div class="p-6 border-t border-slate-50 text-center" :class="{'block': mobileMenuOpen, 'hidden': !mobileMenuOpen && !window.matchMedia('(min-width: 768px)').matches}">
          <p class="text-xxs text-slate-400 font-medium">MindCompanion © 2026</p>
          <p class="text-xxs text-indigo-400/80 mt-0.5">Hackathon Build v2.1</p>
        </div>
      </aside>

      <!-- Main Content Area -->
      <main class="flex-1 flex flex-col min-w-0 bg-slate-50/50 p-4 sm:p-6 md:p-8 overflow-y-auto">
        
        <!-- Warning reminder banner for missing API Key -->
        <div x-show="!geminiApiKey" x-cloak class="mb-6 p-4 bg-amber-50 border border-amber-200/60 rounded-2xl flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 shadow-sm">
          <div class="flex items-center space-x-3 text-amber-800">
            <span class="text-xl">⚠️</span>
            <div class="text-xs">
              <p class="font-bold">Live GenAI Integration Disabled</p>
              <p class="text-amber-700 font-semibold">Gemini API Key is missing. The app is running in Heuristic Simulation mode. Click settings to add a live key.</p>
            </div>
          </div>
          <button @click="settingsOpen = true" class="px-4 py-2 bg-amber-600 hover:bg-amber-750 text-white rounded-xl text-xs font-bold transition shrink-0 shadow-sm shadow-amber-200">
            Configure API Key
          </button>
        </div>

        <!-- Header Toolbar -->
        <header class="flex flex-col sm:flex-row sm:items-center sm:justify-between mb-8 pb-4 border-b border-slate-100">
          <div>
            <h2 class="text-xs uppercase tracking-widest text-slate-400 font-bold" x-text="activeViewName"></h2>
            <div class="flex items-center space-x-3 mt-1">
              <h1 class="text-2xl sm:text-3xl font-extrabold text-slate-900 tracking-tight" x-text="greetingMessage">Good afternoon!</h1>
              <!-- Top Toolbar Settings Link -->
              <button @click="settingsOpen = true" class="p-1 rounded-full text-slate-400 hover:text-indigo-600 hover:bg-indigo-50 transition" title="Open API Settings">
                <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M10.325 4.317c.426-1.756 2.924-1.756 3.35 0a1.724 1.724 0 002.573 1.066c1.543-.94 3.31.826 2.37 2.37a1.724 1.724 0 001.065 2.572c1.756.426 1.756 2.924 0 3.35a1.724 1.724 0 00-1.066 2.573c.94 1.543-.826 3.31-2.37 2.37a1.724 1.724 0 00-2.572 1.065c-.426 1.756-2.924 1.756-3.35 0a1.724 1.724 0 00-2.573-1.066c-1.543.94-3.31-.826-2.37-2.37a1.724 1.724 0 00-1.065-2.572c-1.756-.426-1.756-2.924 0-3.35a1.724 1.724 0 001.066-2.573c-.94-1.543.826-3.31 2.37-2.37.996.608 2.296.07 2.572-1.065z"></path>
                  <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2.5" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z"></path>
                </svg>
              </button>
            </div>
          </div>
          
          <!-- Motivational Quote Banner -->
          <div class="mt-4 sm:mt-0 p-3 sm:p-4 bg-gradient-to-r from-indigo-50/60 to-teal-50/60 border border-indigo-100/50 rounded-2xl max-w-md shadow-sm">
            <p class="text-xs sm:text-sm font-semibold text-slate-700 italic flex items-start">
              <span class="text-indigo-400 text-lg leading-none mr-2 font-serif">“</span>
              <span x-text="motivationalQuote">One mock test does not define your future. Focus on concepts, not outcomes.</span>
              <span class="text-indigo-400 text-lg leading-none ml-1 font-serif">”</span>
            </p>
          </div>
        </header>

        <!-- VIEWS CONTAINER -->
        <div class="flex-1">

          <!-- ================== VIEW: DASHBOARD ================== -->
          <section x-show="activeView === 'dashboard'" x-transition:enter="transition ease-out duration-300" class="space-y-6">
            
            <!-- Quick Stats Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6">
              <!-- Card 1: Stress Meter -->
              <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                <div class="space-y-1">
                  <span class="text-xs font-bold uppercase text-slate-400 tracking-wider">Current Stress Level</span>
                  <div class="flex items-baseline space-x-1.5">
                    <span class="text-3xl font-extrabold text-slate-900" x-text="todayStressLevel + '/10'"></span>
                    <span class="text-xs font-semibold" :class="getStressColorClass(todayStressLevel)" x-text="getStressLabel(todayStressLevel)"></span>
                  </div>
                  <p class="text-xs text-slate-500 font-medium">Updated from your last entry</p>
                </div>
                <div class="w-14 h-14 rounded-2xl flex items-center justify-center" :class="getStressBgClass(todayStressLevel)">
                  <svg class="w-8 h-8" :class="getStressTextClass(todayStressLevel)" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 19v-6a2 2 0 00-2-2H5a2 2 0 00-2 2v6a2 2 0 002 2h2a2 2 0 002-2zm0 0V9a2 2 0 012-2h2a2 2 0 012 2v10m-6 0a2 2 0 002 2h2a2 2 0 002-2m0 0V5a2 2 0 012-2h2a2 2 0 012 2v14a2 2 0 01-2 2h-2a2 2 0 01-2-2z"></path>
                  </svg>
                </div>
              </div>

              <!-- Card 2: Current Track -->
              <div class="bg-white p-6 rounded-3xl border border-slate-100 shadow-sm flex items-center justify-between">
                <div class="space-y-1">
                  <span class="text-xs font-bold uppercase text-slate-400 tracking-wider">Target Examination</span>
                  <div class="flex items-center space-x-2">
                    <span class="text-3xl font-extrabold text-slate-900" x-text="examTrack"></span>
                    <span class="px-2 py-0.5 bg-indigo-50 text-indigo-700 text-xxs font-extrabold rounded-md uppercase tracking-wider">Aspirant</span>
                  </div>

  <script>
    function appState() {

      }

      return {
        // App Navigation and State
        activeView: 'dashboard',
        activeViewName: 'Dashboard Insight Hub',
        mobileMenuOpen: false,
        settingsOpen: false,
        
        // Onboarding Screen Variables
        hasProfile: profile !== null,
        onboardName: '',
        onboardTrack: 'JEE',
        onboardHours: 8,
        onboardStressor: 'Backlog Anxiety',

        // User Profile Info
        studentName: profile ? profile.name : 'Guest Student',
        examTrack: profile ? profile.track : 'JEE',
        studyHours: profile ? profile.hours : 8,
        primaryStressor: profile ? profile.stressor : 'Backlog Anxiety',
        streakCount: 4,
        todayStressLevel: 7,

        // Settings / API
        geminiApiKey: localStorage.getItem('mind_gemini_api_key') || '',
        
        // Journal Core
        journalText: '',
        promptTags: [
          'Just finished a mock test', 
          'Feeling isolated', 
          'Backlog anxiety', 
          'Sleep deprived', 
          'Parental pressure',
          'Concept block'
        ],
        isAnalyzing: false,
        currentLoadingMsgIdx: 0,
        loadingMessages: [
          'Connecting to academic sanctuary...',
          'AI analyzing emotional patterns...',
          'Scanning for hidden burnout triggers...',
          'Structuring older-mentor advice...',
          'Refining stress relief steps...'
        ],
        loadingInterval: null,
        analysisResult: null,

        // Crisis Guardrail Flags
        crisisKeywordDetected: false,
        crisisFlagged: false,
        crisisKeywords: [
          'suicide', 'kill myself', 'end my life', 'want to die', 
          'hanging myself', 'ending it', 'self-harm', 'harm myself', 
          'slit my wrist', 'no point in living', 'better off dead'
        ],

        // Dashboard stress graph mock data
        stressHistory: [
          { day: 'Mon', score: 6, trigger: 'Mock Test Drop' },
          { day: 'Tue', score: 5, trigger: 'None (Study day)' },
          { day: 'Wed', score: 8, trigger: 'Physics HC Verma Block' },
          { day: 'Thu', score: 7, trigger: 'Mock Test Performance' },
          { day: 'Fri', score: 6, trigger: 'None (Rest session)' },
          { day: 'Sat', score: 4, trigger: 'Breathing relief session' },
          { day: 'Sun', score: 7, trigger: 'Math Backlog Pressure' }
        ],
        hoveredNode: null,

        // Core Triggers list from last logs
        coreTriggers: [
          { name: 'Physics Mock Test', impact: 'High', description: 'Score drop' },
          { name: 'Rotational Mechanics Backlog', impact: 'High', description: 'Concept block' },
          { name: 'Parental Call Expectations', impact: 'Medium', description: 'Comparison pressure' }
        ],

        // Dynamic elements
        greetingMessage: '',
        motivationalQuote: '',
        mentorQuote: '',

        // Coping: Breathing Deck
        breathingActive: false,
        breathingState: 'idle', // idle, inhale, hold1, exhale, hold2
        breathingSeconds: 0,
        breathingTimer: null,

        // Coping: Syllabus Decompressor
        decompressTopic: '',
        decompressing: false,
        decompressedSteps: null,

        // Coping: Pep-Talk
        pepTalkTrack: 'JEE',
        pepTalkText: 'Select an exam track and click generate to receive encouragement from your mentor.',

        // Init Hook
        init() {
          this.setGreeting();
          this.setMotivationalQuote();
          this.setMentorQuote();
          this.generatePepTalk();
        },

        setView(view) {
          this.activeView = view;
          this.mobileMenuOpen = false;
          if (view === 'dashboard') {
            this.activeViewName = 'Dashboard Insight Hub';
          } else if (view === 'journal') {
            this.activeViewName = 'Daily Mind-Dump (Journal)';
          } else if (view === 'coping') {
            this.activeViewName = 'AI Coping Deck & Tools';
          }
        },

        // Onboarding handlers
        submitOnboarding() {
          if (!this.onboardName.trim()) return;

          this.studentName = this.onboardName;
          this.examTrack = this.onboardTrack;
          this.studyHours = Number(this.onboardHours) || 8;
          this.primaryStressor = this.onboardStressor;
          
          // Save profile object
          const profileObj = {
            name: this.studentName,
            track: this.examTrack,
            hours: this.studyHours,
            stressor: this.primaryStressor
          };
          localStorage.setItem('mind_student_profile', JSON.stringify(profileObj));

          // Set default tailored triggers based on onboarding stressor
          this.coreTriggers = [
            { 
              name: this.primaryStressor, 
              impact: 'High', 
              description: `Primary concern for ${this.examTrack} target`
            }
          ];

          // Initialize dashboard greetings
          this.hasProfile = true;
          this.setGreeting();
          this.setMentorQuote();
          this.generatePepTalk();
          this.setMotivationalQuote();
          this.setView('dashboard');
        },

        resetStudentProfile() {
          if (confirm('Are you sure you want to reset your student profile? This will log you out and return to the onboarding setup.')) {
            localStorage.removeItem('mind_student_profile');
            this.hasProfile = false;
            this.studentName = 'Guest Student';
            this.onboardName = '';
            this.settingsOpen = false;
          }
        },

        // Helper calculations for dynamic content
        setGreeting() {
          const hr = new Date().getHours();
          let g = 'Good morning';
          if (hr >= 12 && hr < 17) g = 'Good afternoon';
          else if (hr >= 17 && hr < 22) g = 'Good evening';
          else if (hr >= 22 || hr < 4) g = 'Late night check-in';
          
          this.greetingMessage = `Welcome back, ${this.studentName.split(' ')[0]}!`;
        },

        setMotivationalQuote() {
          const quotes = [
            'One mock test does not define your future. Focus on concepts, not outcomes.',
            'A single rank in a coaching class sheet is not a measure of your human capability.',
            'Beta, take it one step at a time. The syllabus is finite, your health is infinite.',
            'Your parents care about you far more than they care about any rank card.',
            'Focus on the process of learning. The score is a side-effect.'
          ];
          this.motivationalQuote = quotes[Math.floor(Math.random() * quotes.length)];
        },

        setMentorQuote() {
          const quotes = {
            'JEE': 'Rotational mechanics might beat you down for three days, but consistency will build a concrete understanding on the fourth. The exam tests how you stand up, not how many questions you missed.',
            'NEET': 'Remember why you wanted to be a healer. It wasn\'t to score 720/720; it was to serve. Treat your preparation with respect, but treat your mind with kindness. Revision is your strength.',
            'UPSC': 'The syllabus of UPSC is as wide as the ocean, but the standard books are key. Don\'t run after 10 coaching materials. Trust your core revision. Rest is essential for retention.',
            'GATE': 'Concepts are your pillars. When a numerical doesn\'t clear on the first go, analyze the formula source. GATE tests core understanding. Keep your calm during mock exams.',
            'CAT': 'Business school prep is about speed, accuracy, and mental agility. Don\'t let a tough Quantitative Aptitude or DILR block make you doubt your capabilities. CAT is a test of percentile strategy, not complete syllabus cramming. Take a walk, clear your head.'
          };
          this.mentorQuote = quotes[this.examTrack] || quotes['JEE'];
        },

        getStressColorClass(score) {
          if (score <= 4) return 'text-teal-600 bg-teal-50';
          if (score <= 7) return 'text-indigo-600 bg-indigo-50';
          return 'text-red-600 bg-red-50';
        },

        getStressLabel(score) {
          if (score <= 4) return 'Calm / Managed';
          if (score <= 7) return 'Moderate Stress';
          return 'High Burnout Risk';
        },

        getStressBgClass(score) {
          if (score <= 4) return 'bg-teal-50';
          if (score <= 7) return 'bg-indigo-50';
          return 'bg-red-50';
        },

        getStressTextClass(score) {
          if (score <= 4) return 'text-teal-600';
          if (score <= 7) return 'text-indigo-600';
          return 'text-red-600';
        },

        getMoodEmoji(score) {
          if (score <= 3) return '😌'; // very relaxed
          if (score <= 5) return '🙂'; // light stress
          if (score <= 7) return '😐'; // anxious/stressed
          return '😫'; // severe burnout
        },

        // Helper calculations for dynamic SVG stress chart
        getSvgNodeX(index) {
          const padLeft = 40;
          const graphWidth = 440;
          const numNodes = this.stressHistory.length;
          return padLeft + (index * (graphWidth / (numNodes - 1)));
        },

        getSvgNodeY(score) {
          const padTop = 20;
          const graphHeight = 150;
          return (padTop + graphHeight) - (graphHeight * (score / 10));
        },

        getSvgLinePath() {
          return this.stressHistory.map((item, idx) => {
            const x = this.getSvgNodeX(idx);
            const y = this.getSvgNodeY(item.score);
            return `${idx === 0 ? 'M' : 'L'} ${x} ${y}`;
          }).join(' ');
        },

        getSvgAreaPoints() {
          const basePoints = this.stressHistory.map((item, idx) => {
            const x = this.getSvgNodeX(idx);
            const y = this.getSvgNodeY(item.score);
            return `${x},${y}`;
          }).join(' ');
          
          const xStart = this.getSvgNodeX(0);
          const xEnd = this.getSvgNodeX(this.stressHistory.length - 1);
          return `${xStart},170 ${basePoints} ${xEnd},170`;
        },

        getTooltipStyle() {
          if (this.hoveredNode === null) return 'display: none;';
          
          // Calculate node coordinates in parent container percentage or absolute
          const nodeX = this.getSvgNodeX(this.hoveredNode);
          const nodeY = this.getSvgNodeY(this.stressHistory[this.hoveredNode].score);
          
          // Compute tooltip absolute offsets
          // SVG viewBox is 500x200. Tooltip is placed near the node.
          // Translate SVG coordinate system percentages relative to the containing container.
          return `left: calc(${nodeX / 500 * 100}% - 70px); top: calc(${nodeY / 200 * 100}% - 90px);`;
        },

        // Journal Actions
        getWordCount() {
          return this.journalText.trim() === '' ? 0 : this.journalText.trim().split(/\s+/).length;
        },

        appendTagToJournal(tag) {
          const tagPrompts = {
            'Just finished a mock test': "I just finished a mock test and the results were not what I expected. I feel really disappointed and stressed because...",
            'Feeling isolated': "I feel completely isolated prep-wise. Everyone seems to be ahead of me, and I have nobody to really share how anxious I am with...",
            'Backlog anxiety': "I have a massive backlog building up in chapters, especially in mechanics and chemistry, and every time I look at my schedule I freeze up...",
            'Sleep deprived': "I am barely sleeping 4-5 hours a night. My head hurts during mock exams, and I feel constantly tired and unable to focus...",
            'Parental pressure': "I feel like my parents have pinned all their hopes on me clearing this. Whenever they call, I feel an instant chest tightening because...",
            'Concept block': "I am completely stuck on this concept block. I've tried reading it multiple times but nothing is sticking, and I feel stupid..."
          };
          
          const appendStr = tagPrompts[tag] || ` ${tag} `;
          if (this.journalText.trim() === '') {
            this.journalText = appendStr;
          } else {
            this.journalText = this.journalText.trim() + "\n\n" + appendStr;
          }
          this.checkCrisisKeywords();
        },

        clearJournal() {
          this.journalText = '';
          this.crisisKeywordDetected = false;
        },

        checkCrisisKeywords() {
          const lower = this.journalText.toLowerCase();
          this.crisisKeywordDetected = this.crisisKeywords.some(keyword => lower.includes(keyword));
        },

        // API Journal Analysis Trigger (Refactored for live SDK & REST fallback)
        async analyzeJournal() {
          if (this.journalText.trim().length < 15) return;
          
          // Trigger loading
          this.isAnalyzing = true;
          this.currentLoadingMsgIdx = 0;
          this.analysisResult = null;
          
          // Cycle loading messages for visual flavor
          this.loadingInterval = setInterval(() => {
            this.currentLoadingMsgIdx = (this.currentLoadingMsgIdx + 1) % this.loadingMessages.length;
          }, 1200);

          // Force double-check crisis filter
          this.checkCrisisKeywords();
          if (this.crisisKeywordDetected) {
            clearInterval(this.loadingInterval);
            this.isAnalyzing = false;
            this.crisisFlagged = true;
            return;
          }

          // Trigger simulated API call or actual Gemini fetch
          try {
            if (this.geminiApiKey) {
              const res = await this.fetchGeminiAnalysis(this.journalText);
              
              // Validate and structure response
              this.analysisResult = {
                moodScore: Number(res.mood_score) || 5,
                dominantEmotion: res.dominant_emotion || 'Unspecified',
                primaryTrigger: res.hidden_trigger || 'General Pressure',
                mentorResponse: res.empathetic_response || 'Beta, stay strong.',
                copingStrategy: res.micro_action_step || 'Breathe and count to ten.',
                safetyFlag: Boolean(res.safety_flag)
              };

              // Intercept Safety Flag immediately if flagged by the LLM
              if (this.analysisResult.safetyFlag) {
                this.crisisFlagged = true;
                this.isAnalyzing = false;
                clearInterval(this.loadingInterval);
                return;
              }

              // Update Dashboard triggers immediately
              this.updateLiveDashboardTriggers();

            } else {
              // Heuristic Local Simulation (if no API Key)
              const mockResult = this.generateLocalSimulatedAnalysis(this.journalText);
              // Wait 2.5 seconds to simulate complex GenAI processes
              await new Promise(resolve => setTimeout(resolve, 2500));
              this.analysisResult = mockResult;
              
              if (this.analysisResult.safetyFlag) {
                this.crisisFlagged = true;
                this.isAnalyzing = false;
                clearInterval(this.loadingInterval);
                return;
              }
            }
          } catch (e) {
            console.error('Error during GenAI Analysis:', e);
            // Fallback immediately on error
            this.analysisResult = {
              moodScore: 6,
              dominantEmotion: 'Anxious',
              primaryTrigger: 'General Exam Overwhelm',
              mentorResponse: 'Beta, technology sometimes stumbles, but your efforts shouldn\'t. Even in this minor system glitch, remember that your health is paramount. Take deep breaths; you are doing fine.',
              copingStrategy: 'Step away from the screen for 2 minutes. Wash your face with cold water.',
              safetyFlag: false
            };
          } finally {
            clearInterval(this.loadingInterval);
            this.isAnalyzing = false;
          }
        },

        // Google Gemini API direct REST/SDK fetch integration
        async fetchGeminiAnalysis(text) {
          // Injection of student context to Gemini system instructions
          const systemInstruction = `You are a warm, empathetic older academic mentor who cleared competitive exams (IIT-JEE / Civil Services / CAT) in India years ago. You speak with deep emotional intelligence and maturity to highly stressed student aspirants.
          
STUDENT PROFILE CONTEXT:
- Student Name: ${this.studentName}
- Target Examination: ${this.examTrack}
- Daily Study Target: ${this.studyHours} hours
- Primary Core Stressor: ${this.primaryStressor}

You must tailor your response and advice directly to this context. For example, if their primary stressor is ${this.primaryStressor}, formulate your mentor perspective and coping strategy to help them address it. Speak directly to their name and selected target exam.

Analyze their journal entry. Output a valid, clean JSON object ONLY. Do not include markdown code block characters (\`\`\`).
The output JSON must follow this exact structure:
{
  "mood_score": number (1 to 10, where 1 is calm and 10 is high burnout/severe stress),
  "dominant_emotion": "A string naming the dominant feeling (e.g. Backlog overload, isolated, parental pressure)",
  "hidden_trigger": "Brief name of core trigger extracted (e.g. Backlog Pressure, Mock Test Score, Parental Expectations, Physics block)",
  "empathetic_response": "A highly empathetic, personal supportive message of 3-4 sentences written like a warm Indian mentor (use terms like Beta or listen closely, address them by their first name, and talk about perspective, that exams do not define them)",
  "micro_action_step": "A 1-minute actionable mental or physical strategy to do right now tailored to their primary stressor",
  "safety_flag": boolean (set to true ONLY if they indicate self-harm, suicide, extreme despair, or severe clinical burnout crisis)
}`;

          let resultText = '';

          // 1. Try using the official @google/genai SDK (via CDN window hook)
          if (window.GoogleGenAI) {
            try {
              console.log('Attempting live analysis with @google/genai SDK...');
              const ai = new window.GoogleGenAI({ apiKey: this.geminiApiKey });
              const response = await ai.models.generateContent({
                model: 'gemini-1.5-flash',
                contents: text,
                config: {
                  systemInstruction: systemInstruction,
                  responseMimeType: 'application/json'
                }
              });

              if (response && response.text) {
                resultText = response.text;
              } else if (response && response.candidates && response.candidates[0].content.parts[0].text) {
                resultText = response.candidates[0].content.parts[0].text;
              }
            } catch (sdkError) {
              console.warn('SDK method failed, falling back to direct REST fetch. Error:', sdkError);
            }
          }

          // 2. Fallback to direct HTTP REST Fetch if SDK failed or wasn't loaded
          if (!resultText) {
            console.log('Using fallback HTTP REST fetch...');
            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-flash:generateContent?key=${this.geminiApiKey}`, {
              method: 'POST',
              headers: {
                'Content-Type': 'application/json'
              },
              body: JSON.stringify({
                contents: [{
                  parts: [{
                    text: text
                  }]
                }],
                systemInstruction: {
                  parts: [{
                    text: systemInstruction
                  }]
                },
                generationConfig: {
                  responseMimeType: "application/json"
                }
              })
            });

            if (!response.ok) {
              const errBody = await response.text();
              throw new Error(`Gemini API HTTP call failed: ${response.statusText}. Details: ${errBody}`);
            }

            const data = await response.json();
            resultText = data.candidates[0].content.parts[0].text;
          }

          // Parse result text (stripping markdown fences if present)
          resultText = resultText.trim();
          if (resultText.startsWith('```')) {
            resultText = resultText.replace(/^```json\s*/, '').replace(/```$/, '').trim();
          }
          
          return JSON.parse(resultText);
        },

        // Local Heuristic Stress Analysis Engine (WOW factor with custom keyword bindings)
        generateLocalSimulatedAnalysis(text) {
          const lower = text.toLowerCase();
          
          let score = 5;
          let trigger = this.primaryStressor;
          let responseText = '';
          let strategy = '';
          let emotion = 'Anxious';
          let safety = false;

          // Crisis Keywords
          if (this.crisisKeywords.some(keyword => lower.includes(keyword))) {
            safety = true;
          }

          // 1. Evaluate score modifiers
          if (lower.includes('anxious') || lower.includes('stress') || lower.includes('overwhelm')) {
            score += 1;
            emotion = 'Overwhelmed';
          }
          if (lower.includes('fail') || lower.includes('bad') || lower.includes('worst') || lower.includes('zero')) {
            score += 2;
            emotion = 'Demoralized';
          }
          if (lower.includes('cry') || lower.includes('crying') || lower.includes('hopeless')) {
            score += 2;
            emotion = 'Isolated';
          }
          if (lower.includes('parents') || lower.includes('dad') || lower.includes('mom') || lower.includes('father')) {
            score += 1;
            emotion = 'Pressured';
          }
          if (lower.includes('sleep') || lower.includes('tired') || lower.includes('insomnia')) {
            score += 1;
            emotion = 'Sleep Deprived';
          }
          if (lower.includes('backlog') || lower.includes('pending') || lower.includes('syllabus')) {
            score += 1;
            emotion = 'Backlog Strained';
          }
          
          score = Math.min(Math.max(score, 1), 10); // clamp 1-10

          const firstName = this.studentName.split(' ')[0];

          // 2. Select primary trigger based on keywords or default onboarding stressor
          if (lower.includes('mock') || lower.includes('test') || lower.includes('exam') || lower.includes('marks') || lower.includes('rank') || this.primaryStressor === 'Mock Test Scores') {
            trigger = 'Mock Test Performance';
            strategy = 'Write down 3 conceptual mistakes you made. Treat them as diagnostics, not marks. Set a 10-minute timer and review just one concept.';
            
            if (this.examTrack === 'JEE') {
              responseText = `Listen closely, ${firstName}. I remember looking at my physics mock scores and feeling absolute panic. But remember, mock tests are designed to mock you—to find your faults before the actual day. They are not final report cards of your intelligence. Focus on why rotational mechanics or chemistry equations slipped, not the marks. You are learning.`;
            } else if (this.examTrack === 'NEET') {
              responseText = `Listen to me, ${firstName}. A low score on a Biology or Physics mock does not mean you won\'t wear that white coat. It only tells you which NCERT pages need one more visual scan. Take your eyes off the rank list. Focus on error correction.`;
            } else if (this.examTrack === 'CAT') {
              responseText = `Beta ${firstName}, I know looking at CAT QA mock scores can be draining. But remember, CAT rewards accuracy over wild attempts. Focus on accuracy analysis, not raw scores. You are building strategist muscles.`;
            } else {
              responseText = `A mock exam is simply a feedback loop. In ${this.examTrack} preparation, every mistake in a mock is one less mistake on the real day. Analyze the answer key with calm curiosity, not self-blame, ${firstName}.`;
            }
          } 
          else if (lower.includes('parents') || lower.includes('dad') || lower.includes('mom') || lower.includes('father') || lower.includes('mother') || this.primaryStressor === 'Parental Pressure') {
            trigger = 'Parental Expectation Strain';
            strategy = 'Close your eyes. Draw a circle on a paper. Inside write what you control (your effort today). Outside write what you cannot control (other peoples expectations). Focus on the inside.';
            responseText = `I understand the heavy burden of family expectations, ${firstName}. Our parents often communicate their fears as pressure. But remember: they love you far more than they love an exam score. If the burden feels too heavy, tell them honestly that you are trying your best and need their patience. You are not alone.`;
          } 
          else if (lower.includes('sleep') || lower.includes('tired') || lower.includes('exhausted') || lower.includes('headache')) {
            trigger = 'Severe Sleep Deprivation';
            strategy = 'Set an absolute shutdown alarm for 10:30 PM today. No phones, no notes. Drink warm water, and sleep for a full 7.5 hours. Your brain retention requires sleep.';
            responseText = `Listen to me closely, ${firstName}: studying for ${this.studyHours} hours while sleeping for 4 is a recipe for memory decay. Your brain cements formulas and concepts during REM sleep. Rest is not waste; it is active preparation. Take a complete break tonight and sleep.`;
          }
          else if (lower.includes('backlog') || lower.includes('syllabus') || lower.includes('pending') || this.primaryStressor === 'Backlog Anxiety') {
            trigger = 'Syllabus Backlog Strain';
            strategy = 'Identify exactly ONE backlog sub-topic (e.g. nomenclature). Set a timer for 20 minutes, study only that, and write a simple summary. Mark it as done.';
            responseText = `Beta ${firstName}, backlogs are like dust—they pile up if you look at the whole house, but clearing one corner takes minutes. Stop looking at the giant mountain of unfinished syllabus. Choose one simple topic, clear it today, and count that as a massive win. One step.`;
          }
          else if (lower.includes('isolated') || lower.includes('alone') || lower.includes('lonely') || lower.includes('friends') || this.primaryStressor === 'Social Isolation') {
            trigger = 'Social Isolation & Peer Pressure';
            strategy = 'Call a peer or family member for exactly 5 minutes. Talk about anything except syllabus, coaching ranks, or preparation. Reconnect with the human side.';
            responseText = `Competitive exams can feel like solitary confinement, but you must remember you are part of a larger world, ${firstName}. Call an old school friend or a cousin. Step out for a 15-minute walk in a park. You need human interaction to break the mental loop.`;
          }
          else {
            trigger = 'General Academic Strain';
            strategy = 'Do a 2-minute box breathing session. Step away from your study table, stretch your shoulders, and drink a slow glass of water.';
            responseText = `Preparing for ${this.examTrack} is a long marathon, ${firstName}. It is completely normal to feel flat, overwhelmed, or anxious on some days. Do not judge your progress by a single tough afternoon. You are building resilience that will help you long after this exam is over.`;
          }

          return {
            moodScore: score,
            dominantEmotion: emotion,
            primaryTrigger: trigger,
            mentorResponse: responseText,
            copingStrategy: strategy,
            safetyFlag: safety
          };
        },

        updateLiveDashboardTriggers() {
          if (!this.analysisResult) return;
          
          this.todayStressLevel = this.analysisResult.moodScore;

          // Push to core triggers dynamically
          const existingTrigger = this.coreTriggers.find(t => t.name === this.analysisResult.primaryTrigger);
          if (!existingTrigger) {
            this.coreTriggers.unshift({
              name: this.analysisResult.primaryTrigger,
              impact: this.analysisResult.moodScore >= 7 ? 'High' : 'Medium',
              description: this.analysisResult.dominantEmotion || 'Extracted'
            });
            if (this.coreTriggers.length > 4) {
              this.coreTriggers.pop();
            }
          }
        },

        logAnalysisToDashboard() {
          if (!this.analysisResult) return;
          
          // 1. Shift history and push new
          this.stressHistory.shift();
          
          // Get today's day abbreviation
          const days = ['Sun', 'Mon', 'Tue', 'Wed', 'Thu', 'Fri', 'Sat'];
          const todayLabel = days[new Date().getDay()];

          this.stressHistory.push({
            day: todayLabel,
            score: this.analysisResult.moodScore,
            trigger: this.analysisResult.primaryTrigger
          });

          // Sync variables
          this.todayStressLevel = this.analysisResult.moodScore;
          this.updateLiveDashboardTriggers();

          // Trigger alert of success
          alert('Reflection logged successfully! Check your Dashboard stress trend chart.');
          
          // Reset journal and return to dashboard view
          this.setView('dashboard');
          this.clearJournal();
          this.setMotivationalQuote();
          this.setMentorQuote();
        },

        // Box Breathing State Machine
        toggleBreathingCycle() {
          if (this.breathingActive) {
            // Stop
            this.breathingActive = false;
            clearInterval(this.breathingTimer);
            this.breathingState = 'idle';
            this.breathingSeconds = 0;
          } else {
            // Start
            this.breathingActive = true;
            this.breathingState = 'inhale';
            this.breathingSeconds = 4;
            
            this.breathingTimer = setInterval(() => {
              this.breathingSeconds -= 1;
              if (this.breathingSeconds <= 0) {
                // Change phase
                this.breathingSeconds = 4;
                if (this.breathingState === 'inhale') {
                  this.breathingState = 'hold1';
                } else if (this.breathingState === 'hold1') {
                  this.breathingState = 'exhale';
                } else if (this.breathingState === 'exhale') {
                  this.breathingState = 'hold2';
                } else {
                  this.breathingState = 'inhale';
                }
              }
            }, 1000);
          }
        },

        getBreathingCircleClass() {
          if (!this.breathingActive) return 'idle-circle';
          if (this.breathingState === 'inhale') return 'inhale-circle';
          if (this.breathingState === 'hold1') return 'hold-circle';
          if (this.breathingState === 'exhale') return 'exhale-circle';
          if (this.breathingState === 'hold2') return 'hold2-circle';
          return 'idle-circle';
        },

        getBreathingLabel() {
          if (!this.breathingActive) return 'Ready to Breathe?';
          if (this.breathingState === 'inhale') return 'Breathe In Slowly';
          if (this.breathingState === 'hold1') return 'Hold Your Breath';
          if (this.breathingState === 'exhale') return 'Exhale Smoothly';
          if (this.breathingState === 'hold2') return 'Hold Empty';
          return 'Rest';
        },

        getBreathingCountdownText() {
          if (!this.breathingActive) return 'Click Begin to start 2-min cycle';
          return `${this.breathingSeconds} Seconds remaining`;
        },

        // Syllabus Decompressor Action
        decompressSyllabus() {
          if (!this.decompressTopic.trim()) return;

          this.decompressing = true;
          this.decompressedSteps = null;

          // Simulated delay for decompression AI
          setTimeout(() => {
            const topic = this.decompressTopic.trim();
            const lower = topic.toLowerCase();
            
            let s1 = '', s2 = '', s3 = '';

            if (lower.includes('rotation') || lower.includes('mechanics') || lower.includes('physics')) {
              s1 = 'Isolate the Free-Body Diagram (FBD) equations of torque. Do not solve full complex pulley problems yet.';
              s2 = 'Spend exactly 15 minutes reviewing 2 solved exemplar formulas for moment of inertia of basic shapes.';
              s3 = 'Draw the parallel-axis theorem equation in a giant box on a blank sheet, place it on your wall, and walk away.';
            } 
            else if (lower.includes('organic') || lower.includes('chemistry') || lower.includes('bonding')) {
              s1 = 'Ignore the synthesis mechanisms for now. Write down just 3 functional group structures on a paper.';
              s2 = 'Set a timer for 15 minutes. Memorize the IUPAC naming priority order list (only the top 5 groups).';
              s3 = 'Practice naming exactly two 4-carbon chains from the textbook, check the answers, and close the book.';
            }
            else if (lower.includes('polity') || lower.includes('laxmikanth') || lower.includes('upsc') || lower.includes('history')) {
              s1 = 'Focus exclusively on the Fundamental Rights overview page. Do not read the full chapter text.';
              s2 = 'Spend 15 minutes writing a simple tree diagram connecting Articles 14 through 18 to their titles.';
              s3 = 'Explain to yourself aloud in 20 seconds what "Right to Equality" implies, then reward yourself with water.';
            }
            else {
              // General syllabus slicing
              s1 = `Isolate the first sub-heading of "${topic}". Ignore the rest of the pages entirely for today.`;
              s2 = 'Read that single sub-heading for 15 minutes. Note down exactly 2 core formulas or key definitions.';
              s3 = 'Solve exactly 1 basic textbook solved example. Close the notebook and take a 5-minute break.';
            }

            this.decompressedSteps = {
              step1: s1,
              step2: s2,
              step3: s3
            };
            this.decompressing = false;
          }, 1500);
        },
